<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            overflow-x: hidden;
        }

        /* 导航栏：对称等距布局 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: transparent;
        }

        /* 中间导航：均匀等距分布 */
        .nav-center {
            display: flex;
            gap: 50px;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-center a {
            color: #fff;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .nav-center a:hover {
            opacity: 0.7;
        }

        .hero {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .eclipse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff 0%, #e5e5e5 20%, transparent 50%);
            filter: blur(15px);
            opacity: 0.9;
            z-index: 1;
        }

        .eclipse::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 30%;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background-color: #000;
        }

        .main-title {
            position: relative;
            z-index: 2;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.2;
            margin-top: 150px;
            color: #fff;
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
            white-space: nowrap;
        }

        .learn-more-btn {
            position: relative;
            z-index: 2;
            margin-top: 80px;
            padding: 8px 22px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .learn-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }

        @media (max-width: 768px) {
            nav { padding: 20px 30px; }
            .nav-center { gap: 25px; }
            .main-title { 
                font-size: 24px; 
                margin-top: 100px; 
                letter-spacing: 3px;
            }
            .eclipse { width: 250px; height: 250px; }
        }
    </style>
</head>
<body>

<!-- 对称导航：Home / About / Strategy / Contact -->
<nav>
    <div class="nav-center">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#strategy">Strategy</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<section class="hero">
    <div class="eclipse"></div>
    <h1 class="main-title">
        Coming Soon
    </h1>
    <a href="#" class="learn-more-btn">Learn More</a>
</section>

</body>
</html>
