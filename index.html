<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计工作室</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* 全局样式 */
        body {
            background-color: #000000;
            color: #FFFFFF; /* 银白色 */
            overflow-x: hidden;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: transparent;
        }

        /* 导航左侧清空（无LOGO） */
        .nav-left {
            width: 20px;
        }

        .nav-center {
            display: flex;
            gap: 50px;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-center a {
            color: #FFFFFF;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .nav-center a:hover {
            opacity: 0.7;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .search-icon {
            width: 18px;
            height: 18px;
            border: 2px solid #FFFFFF;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
        }

        .search-icon::after {
            content: '';
            position: absolute;
            bottom: -6px;
            right: -6px;
            width: 8px;
            height: 2px;
            background-color: #FFFFFF;
            transform: rotate(-45deg);
        }

        .sign-in-btn {
            padding: 6px 18px;
            border: 1px solid #FFFFFF;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            color: #FFFFFF;
            transition: all 0.3s ease;
        }

        .sign-in-btn:hover {
            background-color: #FFFFFF;
            color: #000;
        }

        /* 主视觉区 + 日食光晕 */
        .hero {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .eclipse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(
                circle at 30% 30%,
                #FFFFFF 0%,
                #E5E5E5 20%,
                transparent 50%,
                transparent 100%
            );
            filter: blur(15px);
            opacity: 0.9;
            z-index: 1;
        }

        /* 黑色遮挡，模拟日食效果 */
        .eclipse::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 30%;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background-color: #000;
        }

        /* 主标题：缩小一倍 + 银白色 + 向下移动 */
        .main-title {
            position: relative;
            z-index: 2;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: #FFFFFF;
            text-align: center;
            line-height: 1.2;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            margin-top: 120px; /* 核心：让文字下移 */
        }

        /* Learn More按钮 */
        .learn-more-btn {
            position: relative;
            z-index: 2;
            margin-top: 80px;
            padding: 8px 22px;
            background-color: #FFFFFF;
            color: #000;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .learn-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            nav {
                padding: 20px 30px;
                flex-wrap: wrap;
                gap: 20px;
            }

            .nav-center {
                gap: 20px;
                order: 3;
                width: 100%;
                justify-content: center;
            }

            .main-title {
                font-size: 24px;
                letter-spacing: 6px;
                margin-top: 80px;
            }

            .eclipse {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏：无LOGO、无文字，极简样式 -->
    <nav>
        <div class="nav-left"></div>
        <div class="nav-center">
            <a href="#home">Home</a>
            <a href="#about">About Us</a>
            <a href="#contact">Contact Us</a>
        </div>
        <div class="nav-right">
            <div class="search-icon"></div>
            <a href="#signin" class="sign-in-btn">Sign In</a>
        </div>
    </nav>

    <!-- 主视觉区 -->
    <section class="hero" id="home">
        <div class="eclipse"></div>
        <h1 class="main-title">
            Coming<br>Soon
        </h1>
        <a href="#works" class="learn-more-btn">Learn More</a>
    </section>
</body>
</html>
